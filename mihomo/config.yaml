  - GEOSITE,category-ads-all,广告拦截
  - RULE-SET,AWAvenue,广告拦截
  
  # 防国外QUIC
  - AND,((DST-PORT,443),(NETWORK,UDP),(NOT,((GEOIP,CN)))),REJECT
  
  # --------特殊规则--------
  # 内网
  - GEOSITE,private,DIRECT
  - GEOIP,private,DIRECT,no-resolve
  
  # API轮换代理
