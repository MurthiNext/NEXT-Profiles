# ==================== 基础配置 ====================
# 代理提供者模板
BaseProvider: &BaseProvider {type: http, interval: 86400, proxy: DIRECT, health-check: {enable: true, url: https://www.google.com/generate_204, interval: 300}, filter: "^(?!.*(群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author))"}

# 策略组类型模板
BaseFB: &BaseFB {type: fallback, interval: 300, lazy: true, url: https://www.google.com/generate_204}
BaseCH: &BaseCH {type: load-balance, interval: 300, lazy: true, url: https://www.google.com/generate_204, strategy: consistent-hashing, hidden: true}
BaseCR: &BaseCR {type: load-balance, interval: 300, lazy: true, url: https://www.google.com/generate_204, strategy: round-robin, hidden: true}
BaseUT: &BaseUT {type: url-test, interval: 300, lazy: true, url: https://www.google.com/generate_204, hidden: true}

# 节点筛选正则表达式
FilterHK: &FilterHK "^(?=.*(?i)(港|🇭🇰|HK|Hong|HKG))(?!.*(排除1|排除2|5x)).*$"
FilterSG: &FilterSG "^(?=.*(?i)(坡|🇸🇬|SG|Sing|SIN|XSP))(?!.*(排除1|排除2|5x)).*$"
FilterJP: &FilterJP "^(?=.*(?i)(日|🇯🇵|JP|Japan|NRT|HND|KIX|CTS|FUK))(?!.*(排除1|排除2|5x)).*$"
FilterKR: &FilterKR "^(?=.*(?i)(韩|🇰🇷|韓|首尔|南朝鲜|KR|KOR|Korea|South))(?!.*(排除1|排除2|5x)).*$"
FilterUS: &FilterUS "^(?=.*(?i)(美|🇺🇸|US|USA|SJC|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD))(?!.*(排除1|排除2|5x)).*$"
FilterTW: &FilterTW "^(?=.*(?i)(?:台|🇹🇼|TW|tw\b|taiwan|taipei|kaohsiung|tpe|tsa|khh))(?!.*(排除1|排除2|5x)).*$"
FilterEU: &FilterEU "^(?=.*(?i)(奥|比|保|克罗地亚|塞|捷|丹|爱沙|芬|法|德|希|匈|爱尔|意|拉|立|卢|马耳它|荷|波|葡|罗|斯洛伐|斯洛文|西|瑞|英|🇧🇪|🇨🇿|🇩🇰|🇫🇮|🇫🇷|🇩🇪|🇮🇪|🇮🇹|🇱🇹|🇱🇺|🇳🇱|🇵🇱|🇸🇪|🇬🇧|CDG|FRA|AMS|MAD|BCN|FCO|MUC|BRU))(?!.*(排除1|排除2|5x)).*$"
FilterOT: &FilterOT "^(?!.*(DIRECT|直接连接|美|港|坡|台|新|日|韩|奥|比|保|克罗地亚|塞|捷|丹|爱沙|芬|法|德|希|匈|爱尔|意|拉|立|卢|马其它|荷|波|葡|罗|斯洛伐|斯洛文|西|瑞|英|🇭🇰|🇼🇸|🇹🇼|🇸🇬|🇯🇵|🇰🇷|🇺🇸|🇬🇧|🇦🇹|🇧🇪|🇨🇿|🇩🇰|🇫🇮|🇫🇷|🇩🇪|🇮🇪|🇮🇹|🇱🇹|🇱🇺|🇳🇱|🇵🇱|🇸🇪|HK|TW|SG|JP|KR|US|GB|CDG|FRA|AMS|MAD|BCN|FCO|MUC|BRU|HKG|TPE|TSA|KHH|SIN|XSP|NRT|HND|KIX|CTS|FUK|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD|LHR|LGW))"
FilterAL: &FilterAL "^(?!.*(DIRECT|直接连接|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author))"

# 自建ver.
FilterSP: &FilterSP "^(?=.*(?i)(自建))(?!.*(排除1|排除2|5x)).*$"
FilterHK_SP: &FilterHK_SP "^(?=.*(?i)(自建|港|🇭🇰|HK|Hong|HKG))(?!.*(排除1|排除2|5x)).*$"
FilterUS_SP: &FilterUS_SP "^(?=.*(?i)(自建|美|🇺🇸|US|USA|SJC|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD))(?!.*(排除1|排除2|5x)).*$"

# ==================== 代理提供 ====================
proxy-providers:
  Airport1: {<<: *BaseProvider, url: "<url>", override: {additional-prefix: "[优] "}, path: ./proxies/Airport1.yaml}
  Airport2: {<<: *BaseProvider, url: "<url>", override: {additional-prefix: "[普] "}, path: ./proxies/Airport2.yaml}
  Airport3: {<<: *BaseProvider, url: "<url>", override: {additional-prefix: "[廉] "}, path: ./proxies/Airport3.yaml}

proxies: # 名称包含“自建”则视为自建节点
  - name: 美国自建VLESS-Reality
    type: vless
    server: servername
    port: 11451

Best: &Best {use: [Airport1]} # 优质，适用于IP敏感的网站
Daily: &Daily {use: [Airport2]} # 日用，适用于常规网站
Cheap: &Cheap {use: [Airport3]} # 廉价，适用于下载网站

DailyHK: &DailyHK {<<: *Daily, type: select, proxies: [香港策略, 狮城策略, 日本策略, 韩国策略, 美国策略, 台湾策略, 欧盟策略, 默认代理, 全球手动, 冷门自选, DIRECT], include-all-proxies: true, filter: *FilterHK_SP}
DailyUS: &DailyUS {<<: *Daily, type: select, proxies: [美国策略, 台湾策略, 欧盟策略, 香港策略, 狮城策略, 日本策略, 韩国策略, 默认代理, 全球手动, 冷门自选, DIRECT], include-all-proxies: true, filter: *FilterUS_SP}
DailyDF: &DailyDF {<<: *Daily, type: select, proxies: [默认代理, 香港策略, 狮城策略, 日本策略, 韩国策略, 美国策略, 台湾策略, 欧盟策略, 全球手动, 冷门自选, DIRECT], include-all-proxies: true, filter: *FilterSP}
BestUS: &BestUS {<<: *Best, type: select, proxies: [美国精选, 台湾精选, 欧盟精选, 香港精选, 狮城精选, 日本精选, 韩国精选, 默认代理, 全球手动, 冷门自选, DIRECT], include-all-proxies: true, filter: *FilterUS_SP}
  
# ==================== 核心配置 ====================
# 基础配置
mode: rule
mixed-port: 7890
ipv6: true
allow-lan: true
unified-delay: true
tcp-concurrent: true
log-level: warning
bind-address: "*"
find-process-mode: always
keep-alive-interval: 15
keep-alive-idle: 600

# 实验性功能
experimental:
  quic-go-disable-gso: true

# 管理面板配置
external-controller: 0.0.0.0:9090
secret: clashsecret

# 配置存储
profile:
  store-selected: true
  store-fake-ip: true

# 流量嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - Mijia Cloud
    - +.push.apple.com

# TUN模式配置
tun:
  enable: false
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  stack: mixed
  dns-hijack:
    - any:53
    - tcp://any:53

# DNS配置
dns:
  enable: true
  ipv6: true
  cache-algorithm: arc
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/15
  fake-ip-range6: fdfe:dcba:9876::1/64
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - rule-set:fakeip-filter
    - geosite:private
    - geosite:connectivity-check
    - "ssh.github.com"
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://223.6.6.6/dns-query
  direct-nameserver:
    - https://223.5.5.5/dns-query
    - https://223.6.6.6/dns-query
  respect-rules: true
    
# GeoIP自动更新
geodata-mode: true
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: https://gh-proxy.org/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat
  geosite: https://gh-proxy.org/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
  mmdb: https://gh-proxy.org/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb
  asn: https://gh-proxy.org/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb
   
